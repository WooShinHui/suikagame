        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                position: fixed;
                height: -webkit-fill-available;
                touch-action: none;
                overflow: hidden;
                background-color: #000;
            }
            #contents {
                position: relative;
                width: 100%;
                height: 100%;

            }
            canvas {

                left: 0 !important;

                display: block;
            }
            #loadShot {

                pointer-events: none;

            /* ══════════════════════════════════════
               LOADING SCREEN
               - 배경은 본인이 직접 설정
               - 프로그레스 바만 하단에 고정
            ══════════════════════════════════════ */
            #loading-screen {
                position: fixed;
                inset: 0;
                z-index: 9999;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: flex-end;
                padding-bottom: 13%; /* 세로 기본값 */
                opacity: 0;
                transition: opacity 0.3s ease;
                background-repeat: no-repeat;
            }
            @media (orientation: landscape) {
                #loading-screen {
                    padding-bottom: 5%;
                }

                .progress-wrap {
                    width: clamp(
                        160px,
                        40vw,
                        280px
                    ); /* 가로에서 바 너무 크지 않게 */
                }

                .logo-wrap {
                    width: clamp(120px, 30vw, 220px); /* 로고도 비례 축소 */
                }
            }
            .progress-wrap {
                width: clamp(200px, 58vw, 320px);
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 8px;
            }

            /* LOADING 텍스트 */
            .loading-label {
                font-family: 'Montserrat', sans-serif;
                font-weight: 700;
                font-size: clamp(12px, 3.2vw, 16px);
                letter-spacing: 4px;
                color: #fff;
                text-shadow: 0 2px 0 rgba(0, 0, 0, 0.3),
                    0 0 10px rgba(255, 255, 255, 0.2);
            }

            /* 나무 테두리 */
            .progress-outer {
                width: 100%;
                padding: 5px;
                border-radius: 99px;
                background: linear-gradient(
                    180deg,
                    #d4900f 0%,
                    #f0b030 40%,
                    #c47010 100%
                );
                box-shadow: 0 5px 0 #7a4a05, 0 7px 14px rgba(0, 0, 0, 0.4),
                    inset 0 1px 0 rgba(255, 255, 255, 0.35);
            }

            /* 어두운 홈 트랙 */
            .progress-track {
                width: 100%;
                height: clamp(14px, 4vw, 22px);
                border-radius: 99px;
                background: linear-gradient(180deg, #4a2a00 0%, #6a3e0a 100%);
                box-shadow: inset 0 3px 7px rgba(0, 0, 0, 0.55);
                overflow: hidden;
                position: relative;
            }

            /* 채워지는 노란 바 */
            .progress-fill {
                height: 100%;
                width: 0%;
                border-radius: 99px;
                background: linear-gradient(
                    180deg,
                    #ffe566 0%,
                    #ffb800 50%,
                    #dd8800 100%
                );
                box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.5),
                    0 0 8px rgba(255, 185, 0, 0.7);
                transition: width 0.22s ease;
                position: relative;
            }

            /* 광택 하이라이트 */
            .progress-fill::after {
                content: '';
                position: absolute;
                top: 2px;
                left: 8px;
                right: 8px;
                height: 38%;
                border-radius: 99px;
                background: rgba(255, 255, 255, 0.38);
            }

            /* 퍼센트 */
            .progress-pct {
                font-family: 'Montserrat', sans-serif;
                font-weight: 700;
                font-size: clamp(10px, 2.8vw, 14px);
                color: #ffe8a0;
                text-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
                letter-spacing: 1px;
            }

            /* 페이드아웃 */
            #loading-screen.fade-out {
                animation: fadeOut 0.45s ease forwards;
            }
            .logo-wrap {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%); /* 살짝 위로 */
                width: clamp(160px, 55vw, 320px);
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .loading-logo {
                width: 100%;
                height: auto;
                object-fit: contain;
                filter: drop-shadow(0 6px 16px rgba(0, 0, 0, 0.45));
                animation: logoPulse 2s ease-in-out infinite;
            }

            /* 살짝 숨쉬는 애니메이션 */
            @keyframes logoPulse {
                0%,
                100% {
                    transform: scale(1);
                    opacity: 1;
                }
                50% {
                    transform: scale(1.04);
                    opacity: 0.92;
                }
            }

            @keyframes fadeOut {
                to {
                    opacity: 0;
                    pointer-events: none;
                }
            }
        </style>

        <title>Suika Game</title>
        <link
            rel="preload"

            type="font/woff2"
            crossorigin

        <style>
            @font-face {
                font-family: 'SchoolSafeDungGeunMiSo';
                src: url('./static/fonts/SchoolSafeDungGeunMiSo.woff2')
                    format('woff2');
                font-weight: normal;
                font-style: normal;
                font-display: swap;
            }
        </style>

    <body>
        <!-- ✅ 로딩 화면 -->
        <div id="loading-screen">
            <!-- ✅ 로고 추가 -->
            <div class="logo-wrap">
                <img
                    src="./static/assets/images/logo.png"
                    class="loading-logo"
                    alt="logo"
                />
            </div>

            <div class="progress-wrap">
                <div class="loading-label">LOADING</div>
                <div class="progress-outer">
                    <div class="progress-track">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                </div>
                <div class="progress-pct" id="progress-pct">0%</div>
            </div>
        </div>

        <div id="contents">
            <img id="loadShot" src="/loadshot.png" />
            <canvas id="create_cvs"></canvas>
        </div>
        <div
            id="version-tag"
            style="
                position: fixed;
                bottom: 8px;
                left: 10px;
                font-family: 'Montserrat', sans-serif;
                font-size: 11px;
                color: rgba(255, 255, 255, 1);
                letter-spacing: 1px;
                pointer-events: none;
                z-index: 10000;
                user-select: none;
            "
        >
            v1.0.0
        </div>
        <script>
            window.LoadingScreen = {
                setProgress: function (value) {
                    var v = Math.min(100, Math.max(0, value));
                    var fill = document.getElementById('progress-fill');
                    var pct = document.getElementById('progress-pct');
                    if (fill) fill.style.width = v + '%';
                    if (pct) pct.textContent = Math.round(v) + '%';
                },
                finish: function () {
                    window.LoadingScreen.setProgress(100);
                    setTimeout(function () {
                        var el = document.getElementById('loading-screen');
                        if (!el) return;
                        el.classList.add('fade-out');
                        el.addEventListener(
                            'animationend',
                            function () {
                                el.remove();
                            },
                            { once: true }
                        );
                    }, 300);
                },
            };

            // ✅ BG를 캔버스 영역에 맞춤 (UIScale과 동일한 로직)
            function fitLoadingBg() {
                var el = document.getElementById('loading-screen');
                if (!el) return;
                var sh = window.innerHeight;
                var sw = window.innerWidth;
                var CANVAS_W = 2844,
                    CANVAS_H = 1600;
                var scale = sh / CANVAS_H;
                var scaledW = CANVAS_W * scale;
                var offsetX = (sw - scaledW) / 2;
                el.style.backgroundSize = scaledW + 'px ' + sh + 'px';
                el.style.backgroundPosition = offsetX + 'px 0px';
            }

            fitLoadingBg();
            window.addEventListener('resize', fitLoadingBg);

            var bgImg = new Image();
            bgImg.onload = function () {
                var el = document.getElementById('loading-screen');
                if (!el) return;
                el.style.backgroundImage =
                    'url(./assets/images/bg_loading.png)';
                fitLoadingBg();
                el.style.opacity = '1';
            };
            bgImg.onerror = function () {
                document.getElementById('loading-screen').style.opacity = '1';
            };
            bgImg.src = './assets/images/bg_loading.png';
        </script>

        <script src="./src/Main.ts"></script>
    </body>
